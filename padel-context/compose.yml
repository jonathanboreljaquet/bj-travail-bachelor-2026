name: padel-context

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: padel-context-api
    ports:
      - "${API_HTTP_PORT:-3000}:3000"
    environment:
      TZ: UTC
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${DATABASE_NAME:-padel-context-db}"
      POSTGRES_USER: "${DATABASE_USER:-padel-context-db_user}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD:-padel-context-db_password}"
      MAX_UPCOMING_MATCHES: "${MAX_UPCOMING_MATCHES:-5}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:-change-me}"
      DATABASE_URL: "postgresql://${DATABASE_USER:-padel-context-db_user}:${DATABASE_PASSWORD:-padel-context-db_password}@db:5432/${DATABASE_NAME:-padel-context-db}?schema=public"
    volumes:
      - ./api/src:/app/src
      - ./api/tests:/app/tests
      - ./api/package.json:/app/package.json
      - ./api/tsconfig.json:/app/tsconfig.json
      - ./api/data/weather-forecasts:/app/data/weather-forecasts
      - ./api/data/weather-metapoints:/app/data/weather-metapoints
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - padel-context-network

  db:
    image: postgres:18.3-alpine3.23
    container_name: padel-context-db
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_DB: "${DATABASE_NAME:-padel-context-db}"
      POSTGRES_USER: "${DATABASE_USER:-padel-context-db_user}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD:-padel-context-db_password}"
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_HOST_PORT:-5433}:5432"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-padel-context-db_user} -d ${DATABASE_NAME:-padel-context-db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - padel-context-network

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: padel-context-mcp-server
    ports:
      - "${MCP_SERVER_HTTP_PORT:-3001}:3001"
    environment:
      TZ: UTC
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      MCP_INTERNAL_SECRET: "${MCP_INTERNAL_SECRET:-}"
    volumes:
      - ./mcp-server/src:/app/src
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - padel-context-network

  mcp-client-web:
    build:
      context: ./mcp-client-web
      dockerfile: Dockerfile
    container_name: padel-context-mcp-client-web
    ports:
      - "${MCP_CLIENT_WEB_HTTP_PORT:-3002}:3002"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
      GOOGLE_GENERATIVE_AI_API_KEY: "${GOOGLE_GENERATIVE_AI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-3.1-flash-lite}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_BASE_URL: "${LANGFUSE_BASE_URL:-}"
      UPSTASH_REDIS_REST_URL: "${UPSTASH_REDIS_REST_URL:-}"
      UPSTASH_REDIS_REST_TOKEN: "${UPSTASH_REDIS_REST_TOKEN:-}"
      MCP_INTERNAL_SECRET: "${MCP_INTERNAL_SECRET:-}"
      # Trafic MCP routé via mitmproxy pour inspection (commenter cette ligne pour revenir au serveur direct)
      MCP_SERVER_URL: "http://mcp-proxy:8080/mcp"
    volumes:
      - ./mcp-client-web/src:/app/src
    depends_on:
      mcp-server:
        condition: service_started
      mcp-proxy:
        condition: service_started
    restart: unless-stopped
    networks:
      - padel-context-network

  mcp-proxy:
    image: mitmproxy/mitmproxy
    container_name: padel-context-mcp-proxy
    # Reverse proxy placé devant le serveur MCP pour inspecter tout le trafic JSON-RPC.
    command: mitmweb --mode reverse:http://mcp-server:3001 --web-host 0.0.0.0 --set web_open_browser=false --set web_password=padelcontext
    ports:
      - "${MCP_PROXY_WEB_PORT:-8081}:8081" # UI web d'inspection sur http://localhost:8081
    depends_on:
      mcp-server:
        condition: service_started
    networks:
      - padel-context-network

volumes:
  postgres_data:
    driver: local

networks:
  padel-context-network:
    name: padel-context-network
    driver: bridge
